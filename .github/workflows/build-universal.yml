name: Build MacNCheese DMGs

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            artifact_name: MacNCheese-arm64-dmg
            dmg_name: MacNCheese-arm64.dmg
          - arch: x86_64
            artifact_name: MacNCheese-intel-dmg
            dmg_name: MacNCheese-intel.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Rosetta 2
        if: matrix.arch == 'x86_64'
        run: sudo softwareupdate --install-rosetta --agree-to-license

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Make build script executable
        run: chmod +x .github/scripts/build-macos.sh

      - name: Build DMG
        run: .github/scripts/build-macos.sh ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.dmg_name }}
          retention-days: 7

  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: MacNCheese-arm64-dmg
          path: artifacts/arm64

      - name: Download intel artifact
        uses: actions/download-artifact@v4
        with:
          name: MacNCheese-intel-dmg
          path: artifacts/intel

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/arm64/MacNCheese-arm64.dmg
            artifacts/intel/MacNCheese-intel.dmg
          generate_release_notes: true